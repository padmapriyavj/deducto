# Hybrid gateway: Spring :8080, FastAPI :8000. Nginx is the single CORS source.
# Run: nginx -c /path/to/repo/nginx/nginx.conf
# (May require -p to set prefix / worker temp dirs; for Docker, see ../docker-compose.yml and ../nginx/gateway.docker.conf + CORS_ORIGIN)

events {
  worker_connections 1024;
}

http {
  upstream spring {
    server 127.0.0.1:8080;
  }

  upstream fastapi {
    server 127.0.0.1:8000;
  }

  server {
    listen 80;
    server_name _;

    # Standard proxy headers (inherited by proxy locations; socket.io block overrides as needed)
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Strip CORS from both backends — Nginx owns CORS
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Access-Control-Expose-Headers;

    # Unified CORS policy
    add_header Access-Control-Allow-Origin "http://localhost:5173" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Handle OPTIONS preflight
    if ($request_method = OPTIONS) {
      return 204;
    }

    # Spring routes (longer /api/v1/* prefixes; must match before generic /api/v1/)
    # Use /api/v1/courses (no trailing / on the prefix) so POST|GET /api/v1/courses matches, not only /api/v1/courses/...
    location /api/v1/auth/ {
      proxy_pass http://spring;
    }
    location /api/v1/courses {
      proxy_pass http://spring;
    }
    location /api/v1/lessons/ {
      proxy_pass http://spring;
    }
    location /api/v1/materials/ {
      proxy_pass http://spring;
    }
    location /api/v1/me/ {
      proxy_pass http://spring;
    }
    location /api/v1/shop/ {
      proxy_pass http://spring;
    }
    location /api/v1/dashboard/ {
      proxy_pass http://spring;
    }
    location /api/v1/leaderboard/ {
      proxy_pass http://spring;
    }
    location /health {
      proxy_pass http://spring;
    }

    # Socket.IO — FastAPI; upgrade for WebSocket
    location /socket.io/ {
      proxy_pass http://fastapi;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    # FastAPI catch-all for all other /api/v1/ paths
    location /api/v1/ {
      proxy_pass http://fastapi;
    }
  }
}
