# Nginx in Docker: proxies to Spring and FastAPI on the **host** via host.docker.internal.
# Placeholder __CORS_ORIGIN__ is replaced at container start (see ../docker/gateway-entrypoint.sh).
# Run Spring on 8080 and FastAPI on 8000 on the host, then: docker compose up gateway

events {
  worker_connections 1024;
}

http {
  upstream spring {
    server host.docker.internal:8080;
  }

  upstream fastapi {
    server host.docker.internal:8000;
  }

  server {
    listen 80;
    server_name _;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Methods;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Credentials;
    proxy_hide_header Access-Control-Max-Age;
    proxy_hide_header Access-Control-Expose-Headers;

    add_header Access-Control-Allow-Origin "__CORS_ORIGIN__" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = OPTIONS) {
      return 204;
    }

    location /api/v1/auth/ { proxy_pass http://spring; }
    location /api/v1/courses { proxy_pass http://spring; }
    location /api/v1/lessons/ { proxy_pass http://spring; }
    location /api/v1/materials/ { proxy_pass http://spring; }
    location /api/v1/me/ { proxy_pass http://spring; }
    location /api/v1/shop/ { proxy_pass http://spring; }
    location /api/v1/dashboard/ { proxy_pass http://spring; }
    location /api/v1/leaderboard/ { proxy_pass http://spring; }
    location /health { proxy_pass http://spring; }
    location /socket.io/ {
      proxy_pass http://fastapi;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
    location /api/v1/ { proxy_pass http://fastapi; }
  }
}
